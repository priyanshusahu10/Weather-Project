<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="weather.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>

<body>
    <div class="container">
        <div class="searchbox">
            <input type="text" placeholder="Enter city name">
            <button> <img src="assets/search.png" alt="" class="searchicon"></button>
        </div>
        <div class="weather">
            <div class="weather-img">
                <img src="assets/clear.png" class="hlo">
                <h1 class="temp">22°C</h1>
                <h1 class="city">New York</h1>

                <div class="detail">
                    <div class="col">
                        <img src="assets/humidity.png" alt="">
                        <div>
                            <h3 class="humidity"> 50%</h3>
                            <h3 class="">Humidity</h3>
                        </div>
                    </div>

                    <div class="col">
                        <img src="assets/wind.png" alt="">
                        <div>
                            <h3 class="speed">15 km/h</h3>
                            <h3>Wind Speed</h3>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    </div>
</body>
<script src="weather.js"></script>

</html>
